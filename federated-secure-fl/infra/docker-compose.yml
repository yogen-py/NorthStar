# 
# Project North Star — Docker Compose (Phase 0)
# Federated learning pipeline: fl-server, 3 hospital clients,
# Keycloak, and a gated malicious client.
# 


services:
  # FL Server (Flower + gRPC) 
  fl-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: fl-server
    ports:
      - "9080:9080"
      - "9081:9081"
    environment:
      - SERVER_ADDRESS=0.0.0.0:9080
      - FLOWER_NUM_ROUNDS=${FLOWER_NUM_ROUNDS:-5}
      - DB_URL=${DB_URL:-sqlite:///./trust.db}
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
      - HITL_ENABLED=${HITL_ENABLED:-true}
      - GATE_PORT=9081
    stdin_open: true
    tty: true
    volumes:
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    networks:
      - fl-net
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',9080)); s.close()\" 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: "no"


  #  FL Middleware (FastAPI) 
  fl-middleware:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: fl-middleware
    command: ["python", "middleware.py"]
    ports:
      - "8000:8000"
    environment:
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - OPA_URL=${OPA_URL:-http://opa:8181}
      - DB_URL=${DB_URL:-sqlite:///./trust.db}
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
    volumes:
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    networks:
      - fl-net
    depends_on:
      keycloak:
        condition: service_healthy
      opa:
        condition: service_healthy
    restart: "no"


  #  Hospital Clients 
  hospital_a:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: hospital_a
    environment:
      - SERVER_ADDRESS=fl-server:9080
      - CLIENT_ID=hospital_a
      - CLIENT_SECRET=hospital_a_pass
      - DATA_PARTITION=0
      - NUM_PARTITIONS=3
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
    volumes:
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    networks:
      - fl-net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: "no"


  hospital_b:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: hospital_b
    environment:
      - SERVER_ADDRESS=fl-server:9080
      - CLIENT_ID=hospital_b
      - CLIENT_SECRET=hospital_b_pass
      - DATA_PARTITION=1
      - NUM_PARTITIONS=3
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
    volumes:
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    networks:
      - fl-net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: "no"


  hospital_c:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: hospital_c
    environment:
      - SERVER_ADDRESS=fl-server:9080
      - CLIENT_ID=hospital_c
      - CLIENT_SECRET=hospital_c_pass
      - DATA_PARTITION=2
      - NUM_PARTITIONS=3
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
    volumes:
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    networks:
      - fl-net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: "no"


  #  Malicious Client (gated) 
  # Only starts with: docker compose --profile attack up malicious_client
  malicious_client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    container_name: malicious_client
    command: ["python", "/experiments/malicious_client.py"]
    volumes:
      - ../experiments:/experiments:ro
      - ../logs:/app/logs
      - ../shared:/app/shared:ro
    environment:
      - SERVER_ADDRESS=fl-server:9080
      - CLIENT_ID=malicious_client
      - DATA_PARTITION=0
      - NUM_PARTITIONS=3
      - ATTACK_MODE=${ATTACK_MODE:-noise}
      - RUN_ID=${RUN_ID:-default}
      - LOG_DIR=/app/logs
    networks:
      - fl-net
    depends_on:
      fl-server:
        condition: service_healthy
    profiles:
      - attack
    restart: "no"


  #  OPA (Policy Decision Point)
  opa:
    image: openpolicyagent/opa:latest-debug
    container_name: opa
    networks: [fl-net]
    command: >
      run --server --addr :8181
      /policies/fl_policy.rego
      /policies/revoked_clients.json
    volumes:
      - ../policy:/policies
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s


  #  Keycloak (Identity Provider) 
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --health-enabled=true --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KC_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - fl-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s


# Network
networks:
  fl-net:
    driver: bridge


# Volumes 
volumes:
  pgdata:
